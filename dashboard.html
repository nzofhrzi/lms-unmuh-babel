<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dashboard — LMS Unmuh Babel</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box}
    body{font-family:'Plus Jakarta Sans',sans-serif;background:#f1f5f9;margin:0}
    .sidebar{width:255px;min-height:100vh;background:#0f172a;position:fixed;top:0;left:0;display:flex;flex-direction:column;z-index:200;transition:transform .28s ease}
    .sidebar-brand{padding:1.4rem 1.3rem 1rem;border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:11px}
    .brand-icon{width:40px;height:40px;background:linear-gradient(135deg,#3b82f6,#10b981);border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;color:#fff;flex-shrink:0}
    .brand-name{color:#fff;font-weight:800;font-size:.98rem;line-height:1.1}
    .brand-name small{display:block;font-size:.65rem;font-weight:500;color:rgba(255,255,255,.38);letter-spacing:.6px;text-transform:uppercase;margin-top:2px}
    .sidebar-role{margin:.9rem 1.1rem .4rem;padding:7px 11px;border-radius:9px;display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.07)}
    .sidebar-role i{font-size:.88rem}.sidebar-role span{font-size:.76rem;font-weight:600;color:rgba(255,255,255,.65)}
    .sidebar-nav{flex:1;padding:.4rem .7rem;overflow-y:auto}
    .nav-section{font-size:.66rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.25);padding:12px 8px 5px}
    .nav-item{display:flex;align-items:center;gap:10px;padding:8px 11px;border-radius:9px;color:rgba(255,255,255,.52);font-size:.86rem;font-weight:500;text-decoration:none;transition:all .15s;margin-bottom:2px}
    .nav-item:hover{background:rgba(255,255,255,.07);color:#fff}
    .nav-item.active{background:rgba(59,130,246,.18);color:#93c5fd;font-weight:600}
    .nav-item i{font-size:1rem;width:19px;flex-shrink:0}
    .sidebar-footer{padding:.9rem 1.1rem;border-top:1px solid rgba(255,255,255,.07)}
    .user-card{display:flex;align-items:center;gap:9px;padding:9px;border-radius:10px;background:rgba(255,255,255,.05);margin-bottom:9px}
    .user-avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#3b82f6,#10b981);display:flex;align-items:center;justify-content:center;color:#fff;font-size:.85rem;font-weight:700;flex-shrink:0}
    .user-info{flex:1;overflow:hidden}
    .user-name{color:#fff;font-size:.82rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .user-nim{color:rgba(255,255,255,.38);font-size:.7rem}
    .btn-logout{width:100%;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);border-radius:9px;color:#f87171;font-size:.82rem;font-weight:600;padding:7px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:all .2s;font-family:'Plus Jakarta Sans',sans-serif}
    .btn-logout:hover{background:rgba(239,68,68,.18)}
    .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:190}
    .overlay.show{display:block}
    .main-wrapper{margin-left:255px;min-height:100vh;display:flex;flex-direction:column}
    .topbar{height:58px;background:#fff;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;padding:0 1.5rem;gap:12px;position:sticky;top:0;z-index:100}
    .topbar-title{font-weight:700;font-size:.98rem;color:#0f172a;flex:1}
    .topbar-date{font-size:.78rem;color:#94a3b8}
    .btn-hmbg{background:none;border:none;font-size:1.3rem;color:#64748b;cursor:pointer;padding:4px;display:none}
    .main-content{flex:1;padding:1.8rem}
    .welcome-banner{background:linear-gradient(135deg,#1d4ed8 0%,#0ea5e9 100%);border-radius:16px;padding:1.8rem 2rem;color:#fff;margin-bottom:1.5rem;position:relative;overflow:hidden}
    .welcome-banner::before{content:'';position:absolute;top:-30px;right:-30px;width:160px;height:160px;background:rgba(255,255,255,.07);border-radius:50%}
    .welcome-banner p{margin:0;font-size:.83rem;opacity:.72}
    .welcome-banner h2{margin:4px 0 8px;font-weight:800;font-size:1.6rem}
    .role-badge{display:inline-block;background:rgba(255,255,255,.15);border-radius:20px;padding:3px 13px;font-size:.78rem;font-weight:600}
    .stat-card{background:#fff;border-radius:13px;padding:1.1rem 1.2rem;box-shadow:0 1px 4px rgba(0,0,0,.06);display:flex;align-items:center;gap:13px}
    .stat-icon{width:44px;height:44px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0}
    .stat-val{font-size:1.4rem;font-weight:800;color:#0f172a;line-height:1}
    .stat-lbl{font-size:.76rem;color:#94a3b8;margin-top:3px}
    .info-card{background:#fff;border-radius:14px;padding:1.3rem;box-shadow:0 1px 4px rgba(0,0,0,.06)}
    .info-card h6{font-weight:700;margin-bottom:1rem;color:#0f172a}
    .info-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f8fafc;font-size:.84rem}
    .info-item:last-child{border-bottom:none}
    .info-item i{width:20px;color:#3b82f6;flex-shrink:0}
    #loadingScreen{position:fixed;inset:0;background:#f1f5f9;display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:12px}
    #loadingScreen p{color:#64748b;font-size:.88rem;margin:0}
    @media(max-width:767px){.sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}.main-wrapper{margin-left:0}.btn-hmbg{display:block}.main-content{padding:1rem}.topbar{padding:0 1rem}}
  </style>
</head>
<body>

<div id="loadingScreen">
  <div class="spinner-border" style="color:#3b82f6;" role="status"></div>
  <p>Memuat dashboard...</p>
</div>

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-brand">
    <div class="brand-icon"><i class="bi bi-mortarboard-fill"></i></div>
    <div class="brand-name">LMS Unmuh Babel <small>Sistem Perkuliahan</small></div>
  </div>
  <div class="sidebar-role" id="sidebarRole"><i class="bi bi-person" style="color:#3b82f6;"></i><span>Memuat...</span></div>
  <nav class="sidebar-nav" id="sidebarNav"></nav>
  <div class="sidebar-footer">
    <div class="user-card">
      <div class="user-avatar" id="userAvatar">?</div>
      <div class="user-info">
        <div class="user-name" id="userName">—</div>
        <div class="user-nim"  id="userNim">—</div>
      </div>
    </div>
    <button class="btn-logout" onclick="doLogout()"><i class="bi bi-box-arrow-left"></i> Keluar</button>
  </div>
</aside>

<div class="main-wrapper">
  <div class="topbar">
    <button class="btn-hmbg" onclick="openSidebar()"><i class="bi bi-list"></i></button>
    <span class="topbar-title">Dashboard</span>
    <span class="topbar-date" id="topbarDate"></span>
  </div>
  <main class="main-content">
    <div class="welcome-banner">
      <p>Selamat datang,</p>
      <h2 id="welcomeName">—</h2>
      <span class="role-badge" id="welcomeRole">—</span>
    </div>
    <div class="row g-3 mb-4" id="statCards"></div>
    <div class="row g-3" id="infoSection"></div>
  </main>
</div>


<script src="shared.js"></script>
<script>

const STATS = {
  mahasiswa: [
    { label:'Mata Kuliah',    icon:'bi-book',            color:'#3b82f6' },
    { label:'Tugas Aktif',    icon:'bi-clipboard-check', color:'#f59e0b' },
    { label:'Total Absensi',  icon:'bi-calendar-check',  color:'#10b981' },
    { label:'Diskusi',        icon:'bi-chat-dots',       color:'#8b5cf6' },
  ],
  dosen: [
    { label:'Matkul Diampu',  icon:'bi-book',            color:'#3b82f6' },
    { label:'Tugas Aktif',    icon:'bi-cloud-upload',    color:'#f59e0b' },
    { label:'Total Mhs',      icon:'bi-people',          color:'#10b981' },
    { label:'Diskusi',        icon:'bi-chat-dots',       color:'#8b5cf6' },
  ],
  admin: [
    { label:'Total User',     icon:'bi-people',          color:'#3b82f6' },
    { label:'Mata Kuliah',    icon:'bi-book',             color:'#f59e0b' },
    { label:'Dosen',          icon:'bi-person-workspace', color:'#10b981' },
    { label:'Mahasiswa',      icon:'bi-person-badge',    color:'#8b5cf6' },
  ],
}

async function init() {
  const user = await requireAuth()
  if (!user) return

  const { id: uid, role, nama, nim } = user

  buildSidebar(role, nama, nim, 'dashboard.html')
  setTopbarDate()

  document.getElementById('welcomeName').textContent = (nama || 'Pengguna') + ' 👋'
  document.getElementById('welcomeRole').textContent = ROLE_INFO[role]?.label || role

  const stats = STATS[role] || STATS.mahasiswa
  const wrap  = document.getElementById('statCards')
  wrap.innerHTML = stats.map((s,i) => `
    <div class="col-6 col-lg-3">
      <div class="stat-card">
        <div class="stat-icon" style="background:${s.color}18;color:${s.color};"><i class="bi ${s.icon}"></i></div>
        <div>
          <div class="stat-val" id="sv${i}">—</div>
          <div class="stat-lbl">${s.label}</div>
        </div>
      </div>
    </div>`).join('')

  hideLoading()
  await loadStats(role, uid)
  await loadInfoSection(role, uid)
}

async function loadStats(role, uid) {
  try {
    if (role === 'mahasiswa') {
      const [enroll, tugas, absensi, diskusi] = await Promise.all([
        apiFetch(`/api/enrollment?mahasiswa_id=${uid}`),
        apiFetch('/api/tugas'),
        apiFetch(`/api/absensi?mahasiswa_id=${uid}`),
        apiFetch('/api/diskusi'),
      ])
      const counts = [enroll.length, tugas.length, absensi.length, diskusi.length]
      counts.forEach((c,i)=>{ const el=document.getElementById('sv'+i); if(el) el.textContent=c })
    } else if (role === 'dosen') {
      const [matkul, tugas, diskusi] = await Promise.all([
        apiFetch(`/api/matkul?dosen_id=${uid}`),
        apiFetch('/api/tugas'),
        apiFetch('/api/diskusi'),
      ])
      const myTugas = tugas.filter(t=>t.dosen_id===uid)
      ;[matkul.length, myTugas.length, 0, diskusi.length].forEach((c,i)=>{ const el=document.getElementById('sv'+i); if(el) el.textContent=c })
      // Hitung mahasiswa dari enrollment matkul dosen
      const mkIds = matkul.map(m=>m.id)
      const enroll = await apiFetch('/api/enrollment')
      const totalMhs = enroll.filter(e=>mkIds.includes(e.matkul_id)).length
      const sv2 = document.getElementById('sv2'); if(sv2) sv2.textContent=totalMhs
    } else if (role === 'admin') {
      const [users, matkul] = await Promise.all([
        apiFetch('/api/users'),
        apiFetch('/api/matkul'),
      ])
      const dosen = users.filter(u=>u.role==='dosen')
      const mhs   = users.filter(u=>u.role==='mahasiswa')
      ;[users.length, matkul.length, dosen.length, mhs.length].forEach((c,i)=>{ const el=document.getElementById('sv'+i); if(el) el.textContent=c })
    }
  } catch(_) {}
}

async function loadInfoSection(role, uid) {
  const sec = document.getElementById('infoSection')
  if (role === 'mahasiswa') {
    const enroll = await apiFetch(`/api/enrollment?mahasiswa_id=${uid}`).catch(()=>[])
    const matkul = await apiFetch('/api/matkul').catch(()=>[])
    const myMatkul = enroll.map(e=>matkul.find(m=>m.id===e.matkul_id)).filter(Boolean)
    sec.innerHTML = `<div class="col-12"><div class="info-card">
      <h6><i class="bi bi-book me-2 text-primary"></i>Mata Kuliah Diambil</h6>
      ${myMatkul.length ? myMatkul.slice(0,5).map(m=>`<div class="info-item"><i class="bi bi-dot"></i><span class="fw-semibold">${m.kode}</span><span class="text-muted ms-2">${m.nama}</span><span class="ms-auto badge bg-light text-secondary">${m.sks} SKS</span></div>`).join('') : '<p class="text-muted small">Belum ada matkul.</p>'}
    </div></div>`
  } else if (role === 'dosen') {
    const matkul = await apiFetch(`/api/matkul?dosen_id=${uid}`).catch(()=>[])
    sec.innerHTML = `<div class="col-12"><div class="info-card">
      <h6><i class="bi bi-book me-2 text-success"></i>Mata Kuliah Diampu</h6>
      ${matkul.length ? matkul.map(m=>`<div class="info-item"><i class="bi bi-dot"></i><span class="fw-semibold">${m.kode}</span><span class="text-muted ms-2">${m.nama}</span><span class="ms-auto badge bg-light text-secondary">${m.sks} SKS</span></div>`).join('') : '<p class="text-muted small">Belum ada matkul diampu.</p>'}
    </div></div>`
  } else if (role === 'admin') {
    const [prodi, users] = await Promise.all([
      apiFetch('/api/prodi').catch(()=>[]),
      apiFetch('/api/users').catch(()=>[]),
    ])
    const recentUser = [...users].sort((a,b)=>new Date(b.created_at)-new Date(a.created_at)).slice(0,5)
    sec.innerHTML = `
      <div class="col-md-6"><div class="info-card">
        <h6><i class="bi bi-diagram-3 me-2 text-warning"></i>Program Studi</h6>
        ${prodi.map(p=>`<div class="info-item"><i class="bi bi-mortarboard"></i><span>${p.kode}</span><span class="text-muted ms-2" style="font-size:.8rem;">${p.nama}</span></div>`).join('')}
      </div></div>
      <div class="col-md-6"><div class="info-card">
        <h6><i class="bi bi-person-plus me-2 text-primary"></i>User Terbaru</h6>
        ${recentUser.map(u=>`<div class="info-item"><i class="bi bi-person"></i><span class="fw-semibold">${u.nama||'—'}</span><span class="ms-auto badge bg-light text-secondary" style="font-size:.72rem;">${u.role}</span></div>`).join('')}
      </div></div>`
  }
}

async function doLogout() { handleLogout() }
init()
</script>
</body>
</html>
