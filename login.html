<!DOCTYPE html>
<html lang="id">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | LMS Unmuh Babel</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Plus Jakarta Sans',sans-serif;
background:#0f172a;
min-height:100vh;
}

.wrapper{
display:flex;
min-height:100vh;
}

.left{
width:45%;
background:
linear-gradient(
135deg,
#0f172a,
#1e3a8a
);

color:white;

padding:60px;

display:flex;
flex-direction:column;
justify-content:center;
}

.logo{
display:flex;
align-items:center;
gap:12px;
margin-bottom:40px;
}

.logo-icon{
width:55px;
height:55px;
border-radius:14px;
background:#3b82f6;

display:flex;
justify-content:center;
align-items:center;

font-size:24px;
}

.logo-text{
font-size:24px;
font-weight:800;
}

.left h1{
font-size:42px;
font-weight:800;
line-height:1.3;
margin-bottom:20px;
}

.left p{
color:#cbd5e1;
line-height:1.8;
}

.feature{
margin-top:30px;
}

.feature div{
margin-bottom:10px;
}

.right{
width:55%;
background:white;

display:flex;
justify-content:center;
align-items:center;

padding:30px;
}

.login-box{
width:100%;
max-width:450px;
}

.login-title{
font-size:34px;
font-weight:800;
margin-bottom:10px;
}

.login-subtitle{
color:#64748b;
margin-bottom:30px;
}

.form-control{
height:55px;
border-radius:12px;
}

.btn-login{
height:55px;
border:none;
border-radius:12px;
background:#2563eb;
font-weight:700;
color:white;
width:100%;
}

.btn-login:hover{
background:#1d4ed8;
}

.error-box{
display:none;
background:#fee2e2;
color:#dc2626;
padding:12px;
border-radius:10px;
margin-bottom:20px;
}

@media(max-width:768px){

.left{
display:none;
}

.right{
width:100%;
}

}

</style>
</head>

<body>

<div class="wrapper">

<div class="left">

<div class="logo">

<div class="logo-icon">
<i class="bi bi-mortarboard-fill"></i>
</div>

<div class="logo-text">
LMS Unmuh Babel
</div>

</div>

<h1>
Sistem Manajemen Pembelajaran Modern
</h1>

<p>
Platform pembelajaran digital Universitas Muhammadiyah Bangka Belitung.
</p>

<div class="feature">

<div>
<i class="bi bi-check-circle-fill"></i>
Absensi Digital
</div>

<div>
<i class="bi bi-check-circle-fill"></i>
Manajemen Tugas
</div>

<div>
<i class="bi bi-check-circle-fill"></i>
Forum Diskusi
</div>

<div>
<i class="bi bi-check-circle-fill"></i>
Dashboard Akademik
</div>

</div>

</div>

<div class="right">

<div class="login-box">

<h2 class="login-title">
Selamat Datang
</h2>

<p class="login-subtitle">
Masukkan NIM/NIDN dan password Anda
</p>

<div
id="errorBox"
class="error-box">
Login gagal
</div>

<div class="mb-3">

<label class="form-label">
NIM / NIDN
</label>

<input
id="nim"
type="text"
class="form-control"
placeholder="Masukkan NIM atau NIDN">

</div>

<div class="mb-4">

<label class="form-label">
Password
</label>

<div class="input-group">

<input
id="password"
type="password"
class="form-control"
placeholder="Masukkan password">

<button
class="btn btn-outline-secondary"
type="button"
onclick="togglePassword()">

<i
id="eyeIcon"
class="bi bi-eye">
</i>

</button>

</div>

</div>

<button
id="btnLogin"
class="btn-login"
onclick="handleLogin()">

Masuk

</button>

</div>

</div>

</div>

<script>

function togglePassword(){

const input =
document.getElementById("password");

const icon =
document.getElementById("eyeIcon");

if(input.type==="password"){

input.type="text";

icon.className=
"bi bi-eye-slash";

}else{

input.type="password";

icon.className=
"bi bi-eye";

}

}

async function handleLogin(){

const nim =
document
.getElementById("nim")
.value
.trim();

const password =
document
.getElementById("password")
.value;

if(!nim || !password){

showError(
"Semua field wajib diisi"
);

return;
}

const btn =
document
.getElementById("btnLogin");

btn.disabled=true;
btn.innerHTML=
"Memproses...";

try{

const response =
await fetch(
"/api/login",
{
method:"POST",
headers:{
"Content-Type":
"application/json"
},
body:JSON.stringify({
nim,
password
})
}
);

const result =
await response.json();

if(!result.success){

showError(
result.message
);

btn.disabled=false;
btn.innerHTML="Masuk";

return;
}

localStorage.setItem(
"user",
JSON.stringify(
result.user
)
);

window.location.href=
"dashboard.html";

}catch(error){

showError(
"Terjadi kesalahan server"
);

btn.disabled=false;
btn.innerHTML="Masuk";

}

}

function showError(msg){

const box =
document
.getElementById(
"errorBox"
);

box.innerHTML=msg;
box.style.display="block";

}

document
.getElementById("password")
.addEventListener(
"keydown",
function(e){

if(e.key==="Enter"){

handleLogin();

}

}
);

</script>

</body>
</html>
