<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <title>Kelola Matkul (Admin) — LMS Praktis</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f1f5f9; margin: 0; }

    /* SIDEBAR */
    .sidebar { width: 255px; min-height: 100vh; background: #0f172a; position: fixed; top: 0; left: 0; display: flex; flex-direction: column; z-index: 200; transition: transform 0.28s ease; }
    .sidebar-brand { padding: 1.4rem 1.3rem 1rem; border-bottom: 1px solid rgba(255,255,255,0.07); display: flex; align-items: center; gap: 11px; }
    .brand-icon { width: 40px; height: 40px; background: linear-gradient(135deg,#3b82f6,#10b981); border-radius: 11px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; color: white; flex-shrink: 0; }
    .brand-name { color: white; font-weight: 800; font-size: 0.98rem; line-height: 1.1; }
    .brand-name small { display: block; font-size: 0.65rem; font-weight: 500; color: rgba(255,255,255,0.38); letter-spacing: 0.6px; text-transform: uppercase; margin-top: 2px; }
    .sidebar-role { margin: 0.9rem 1.1rem 0.4rem; padding: 7px 11px; border-radius: 9px; display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.07); }
    .sidebar-role i { font-size: 0.88rem; }
    .sidebar-role span { font-size: 0.76rem; font-weight: 600; color: rgba(255,255,255,0.65); }
    .sidebar-nav { flex: 1; padding: 0.4rem 0.7rem; overflow-y: auto; }
    .nav-section { font-size: 0.66rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: rgba(255,255,255,0.25); padding: 12px 8px 5px; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 8px 11px; border-radius: 9px; color: rgba(255,255,255,0.52); font-size: 0.86rem; font-weight: 500; text-decoration: none; transition: all 0.15s; margin-bottom: 2px; cursor: pointer; }
    .nav-item:hover { background: rgba(255,255,255,0.07); color: white; }
    .nav-item.active { background: rgba(59,130,246,0.18); color: #93c5fd; font-weight: 600; }
    .nav-item i { font-size: 1rem; width: 19px; flex-shrink: 0; }
    .sidebar-footer { padding: 0.9rem 1.1rem; border-top: 1px solid rgba(255,255,255,0.07); }
    .user-card { display: flex; align-items: center; gap: 9px; padding: 9px; border-radius: 10px; background: rgba(255,255,255,0.05); margin-bottom: 9px; }
    .user-avatar { width: 34px; height: 34px; border-radius: 50%; background: linear-gradient(135deg,#3b82f6,#10b981); display: flex; align-items: center; justify-content: center; color: white; font-size: 0.85rem; font-weight: 700; flex-shrink: 0; }
    .user-info { flex: 1; overflow: hidden; }
    .user-name { color: white; font-size: 0.82rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .user-nim  { color: rgba(255,255,255,0.38); font-size: 0.7rem; }
    .btn-logout { width: 100%; background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); border-radius: 9px; color: #f87171; font-size: 0.82rem; font-weight: 600; padding: 7px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 7px; transition: all 0.2s; font-family: 'Plus Jakarta Sans', sans-serif; }
    .btn-logout:hover { background: rgba(239,68,68,0.18); }

    /* OVERLAY + MAIN */
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 190; }
    .overlay.show { display: block; }
    .main-wrapper { margin-left: 255px; min-height: 100vh; display: flex; flex-direction: column; }
    .topbar { height: 58px; background: white; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; padding: 0 1.5rem; gap: 12px; position: sticky; top: 0; z-index: 100; }
    .topbar-title { font-weight: 700; font-size: 0.98rem; color: #0f172a; flex: 1; }
    .topbar-date { font-size: 0.78rem; color: #94a3b8; }
    .btn-hmbg { background: none; border: none; font-size: 1.3rem; color: #64748b; cursor: pointer; padding: 4px; display: none; }
    .main-content { flex: 1; padding: 1.8rem; }

    /* COMPONENTS */
    .page-header { margin-bottom: 1.5rem; }
    .page-header h3 { font-size: 1.3rem; font-weight: 800; color: #0f172a; margin: 0 0 4px; }
    .page-header p { color: #64748b; font-size: 0.84rem; margin: 0; }

    .card-lms { background: white; border-radius: 14px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); border: none; }
    .card-lms .card-body { padding: 1.3rem; }

    .badge-role { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 20px; font-size: 0.74rem; font-weight: 600; }
    .badge-mhs { background: #eff6ff; color: #2563eb; }
    .badge-dsn { background: #ecfdf5; color: #059669; }
    .badge-adm { background: #f5f3ff; color: #7c3aed; }

    .btn-primary-lms { background: linear-gradient(135deg,#1d4ed8,#2563eb); border: none; border-radius: 9px; padding: 7px 18px; font-size: 0.85rem; font-weight: 700; color: white; display: inline-flex; align-items: center; gap: 7px; cursor: pointer; font-family: 'Plus Jakarta Sans', sans-serif; transition: all 0.2s; box-shadow: 0 3px 10px rgba(37,99,235,0.25); }
    .btn-primary-lms:hover { transform: translateY(-1px); box-shadow: 0 5px 16px rgba(37,99,235,0.35); }
    .btn-secondary-lms { background: #f8fafc; border: 1.5px solid #e2e8f0; border-radius: 9px; padding: 7px 18px; font-size: 0.85rem; font-weight: 600; color: #475569; display: inline-flex; align-items: center; gap: 7px; cursor: pointer; font-family: 'Plus Jakarta Sans', sans-serif; transition: all 0.2s; }
    .btn-secondary-lms:hover { background: #f1f5f9; }

    .tbl { width: 100%; border-collapse: collapse; }
    .tbl thead th { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: #94a3b8; padding: 10px 14px; border-bottom: 1px solid #f1f5f9; white-space: nowrap; }
    .tbl tbody td { padding: 11px 14px; font-size: 0.85rem; color: #334155; border-bottom: 1px solid #f8fafc; vertical-align: middle; }
    .tbl tbody tr:hover td { background: #fafbfc; }
    .tbl tbody tr:last-child td { border-bottom: none; }

    .empty-state { text-align: center; padding: 3rem 2rem; }
    .empty-state i { font-size: 2.5rem; color: #cbd5e1; }
    .empty-state p { color: #94a3b8; font-size: 0.86rem; margin-top: 10px; }

    #loadingScreen { position: fixed; inset: 0; background: #f1f5f9; display: flex; align-items: center; justify-content: center; z-index: 9999; flex-direction: column; gap: 12px; }
    #loadingScreen p { color: #64748b; font-size: 0.88rem; margin: 0; }

    @media (max-width: 767px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .main-wrapper { margin-left: 0; }
      .btn-hmbg { display: block; }
      .main-content { padding: 1rem; }
      .topbar { padding: 0 1rem; }
    }
    .btn-icon { background: none; border: 1.5px solid #e2e8f0; border-radius: 7px; width: 30px; height: 30px; display: inline-flex; align-items: center; justify-content: center; cursor: pointer; font-size: 0.82rem; transition: all 0.15s; color: #64748b; }
    .btn-icon:hover { background: #f8fafc; }
    .btn-icon.del { border-color: #fecaca; color: #dc2626; }
    .btn-icon.del:hover { background: #fef2f2; }
  </style>
</head>
<body>

<div id="loadingScreen">
  <div class="spinner-border" style="color:#3b82f6;" role="status"></div>
  <p>Memuat halaman...</p>
</div>

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-brand">
    <div class="brand-icon"><i class="bi bi-mortarboard-fill"></i></div>
    <div class="brand-name">LMS Praktis <small>Sistem Perkuliahan</small></div>
  </div>
  <div class="sidebar-role" id="sidebarRole">
    <i class="bi bi-person" style="color:#3b82f6;"></i>
    <span>Memuat...</span>
  </div>
  <nav class="sidebar-nav" id="sidebarNav"></nav>
  <div class="sidebar-footer">
    <div class="user-card">
      <div class="user-avatar" id="userAvatar">?</div>
      <div class="user-info">
        <div class="user-name" id="userName">—</div>
        <div class="user-nim" id="userNim">—</div>
      </div>
    </div>
    <button class="btn-logout" onclick="doLogout()">
      <i class="bi bi-box-arrow-left"></i> Keluar
    </button>
  </div>
</aside>

<div class="main-wrapper">
  <div class="topbar">
    <button class="btn-hmbg" onclick="openSidebar()"><i class="bi bi-list"></i></button>
    <span class="topbar-title">Kelola Matkul (Admin)</span>
    <span class="topbar-date" id="topbarDate"></span>
  </div>
  <main class="main-content">
    <div class="page-header d-flex align-items-start justify-content-between flex-wrap gap-2">
      <div>
        <h3><i class="bi bi-journal-bookmark me-2" style="color:#d97706;"></i>Kelola Mata Kuliah</h3>
        <p>Manajemen mata kuliah dan pengampu dosen</p>
      </div>
      <button class="btn-primary-lms" onclick="openTambahMatkul()"><i class="bi bi-plus-lg"></i> Tambah Matkul</button>
    </div>

    <div class="card-lms">
      <div class="card-body">
        <div class="row g-2 mb-3">
          <div class="col-md-5">
            <div style="position:relative;">
              <i class="bi bi-search" style="position:absolute;left:11px;top:50%;transform:translateY(-50%);color:#94a3b8;"></i>
              <input type="text" id="searchMK" class="form-control" style="padding-left:34px;border-radius:9px;font-size:0.85rem;" placeholder="Cari mata kuliah..." oninput="filterMK()" />
            </div>
          </div>
        </div>
        <div class="table-responsive">
          <table class="tbl">
            <thead><tr><th>#</th><th>Kode</th><th>Nama Mata Kuliah</th><th>SKS</th><th>Dosen Pengampu</th><th>Mhs</th><th>Aksi</th></tr></thead>
            <tbody id="mkBody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Modal -->
    <div class="modal fade" id="modalMK" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="border-radius:16px;border:none;">
          <div class="modal-header border-0 pb-0">
            <h6 class="modal-title fw-bold" id="mkModalTitle">Tambah Mata Kuliah</h6>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <div class="row g-2 mb-3">
              <div class="col-5">
                <label class="form-label fw-semibold" style="font-size:0.82rem;">Kode</label>
                <input type="text" class="form-control" id="mkKode" style="border-radius:9px;font-size:0.85rem;" placeholder="MKU101" />
              </div>
              <div class="col-7">
                <label class="form-label fw-semibold" style="font-size:0.82rem;">SKS</label>
                <select class="form-select" id="mkSks" style="border-radius:9px;font-size:0.85rem;">
                  <option value="2">2 SKS</option>
                  <option value="3" selected>3 SKS</option>
                  <option value="4">4 SKS</option>
                </select>
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold" style="font-size:0.82rem;">Nama Mata Kuliah</label>
              <input type="text" class="form-control" id="mkNama" style="border-radius:9px;font-size:0.85rem;" />
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold" style="font-size:0.82rem;">Dosen Pengampu</label>
              <select class="form-select" id="mkDosen" style="border-radius:9px;font-size:0.85rem;">
                <option value="">Pilih dosen...</option>
                <option>Dr. Ahmad Fauzi, M.Pd</option>
                <option>Dr. Siti Rahayu, M.Sc</option>
                <option>Ir. Budi Santoso, M.T</option>
              </select>
            </div>
          </div>
          <div class="modal-footer border-0 pt-0">
            <button class="btn-secondary-lms" data-bs-dismiss="modal">Batal</button>
            <button class="btn-primary-lms" onclick="simpanMK()"><i class="bi bi-check-lg"></i> Simpan</button>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script src="shared.js"></script>
<script>

async function init() {
  const user = await requireRole(['admin'])
  if (!user) return
  const { id: uid, role, nama, nim } = user
  buildSidebar(role, nama, nim, 'adm-matkul.html')
  setTopbarDate()
  hideLoading()
  await loadMatkul()
}

async function doLogout() { handleLogout() }

init()

let allMK = []
let allProdi = []
let allDosen = []
let currentMKEditId = null

async function loadMatkul() {
  try {
    const [matkul, users, prodi] = await Promise.all([
      apiFetch('/api/matkul'),
      apiFetch('/api/users'),
      apiFetch('/api/prodi'),
    ])
    allProdi = prodi
    allDosen = users.filter(u => u.role === 'dosen')
    const enrollment = await apiFetch('/api/enrollment').catch(() => [])
    allMK = matkul.map(m => ({
      ...m,
      dosen: allDosen.find(u => u.id === m.dosen_id)?.nama || '—',
      mhs: enrollment.filter(e => e.matkul_id === m.id).length,
    }))
    renderMK(allMK)
  } catch(err) {
    showToast('Gagal memuat matkul: ' + err.message, 'error')
  }
}

function renderMK(list) {
  const body = document.getElementById('mkBody')
  body.innerHTML = list.map((m, i) => `<tr>
    <td style="color:#94a3b8;">${i+1}</td>
    <td style="font-family:monospace;font-size:0.82rem;">${m.kode}</td>
    <td class="fw-semibold">${m.nama}</td>
    <td><span style="background:#f1f5f9;padding:2px 9px;border-radius:20px;font-size:0.78rem;font-weight:600;">${m.sks} SKS</span></td>
    <td style="font-size:0.83rem;">${m.dosen || '—'}</td>
    <td style="font-size:0.83rem;">${m.mhs || 0}</td>
    <td>
      <button class="btn-icon me-1" title="Edit" onclick="editMK('${m.id}')"><i class="bi bi-pencil"></i></button>
      <button class="btn-icon del" title="Hapus" onclick="hapusMK('${m.id}')"><i class="bi bi-trash"></i></button>
    </td>
  </tr>`).join('')
}

function filterMK() {
  const q = document.getElementById('searchMK').value.toLowerCase()
  renderMK(allMK.filter(m => m.nama.toLowerCase().includes(q) || m.kode.toLowerCase().includes(q)))
}

function openTambahMatkul() {
  currentMKEditId = null
  document.getElementById('mkModalTitle').textContent = 'Tambah Mata Kuliah'
  document.getElementById('mkKode').value  = ''
  document.getElementById('mkNama').value  = ''
  document.getElementById('mkSks').value   = '3'
  document.getElementById('mkDosen').value = ''
  new bootstrap.Modal(document.getElementById('modalMK')).show()
}

function editMK(id) {
  currentMKEditId = id
  const m = allMK.find(x => x.id === id)
  if (!m) return
  document.getElementById('mkModalTitle').textContent = 'Edit Mata Kuliah'
  document.getElementById('mkKode').value  = m.kode
  document.getElementById('mkNama').value  = m.nama
  document.getElementById('mkSks').value   = String(m.sks)
  document.getElementById('mkDosen').value = m.dosen_id || ''
  new bootstrap.Modal(document.getElementById('modalMK')).show()
}

async function simpanMK() {
  const kode  = document.getElementById('mkKode').value.trim()
  const nama  = document.getElementById('mkNama').value.trim()
  const sks   = parseInt(document.getElementById('mkSks').value)
  const dosenId = document.getElementById('mkDosen').value || null
  if (!kode || !nama) { showToast('Kode dan nama wajib diisi', 'error'); return }

  try {
    if (currentMKEditId) {
      await apiFetch('/api/matkul', { method: 'PUT', body: JSON.stringify({ id: currentMKEditId, kode, nama, sks, dosen_id: dosenId }) })
      showToast('Mata kuliah berhasil diperbarui!', 'success')
    } else {
      await apiFetch('/api/matkul', { method: 'POST', body: JSON.stringify({ kode, nama, sks, dosen_id: dosenId }) })
      showToast('Mata kuliah berhasil ditambahkan!', 'success')
    }
    bootstrap.Modal.getInstance(document.getElementById('modalMK')).hide()
    await loadMatkul()
  } catch(err) {
    showToast('Gagal: ' + err.message, 'error')
  }
}

async function hapusMK(id) {
  if (!confirm('Hapus mata kuliah ini?')) return
  try {
    await apiFetch('/api/matkul', { method: 'DELETE', body: JSON.stringify({ id }) })
    showToast('Mata kuliah dihapus', 'info')
    await loadMatkul()
  } catch(err) {
    showToast('Gagal: ' + err.message, 'error')
  }
}
</script>
</body>
</html>
