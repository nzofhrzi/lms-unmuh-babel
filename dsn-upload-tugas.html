<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <title>Upload Tugas (Dosen) — LMS Praktis</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f1f5f9; margin: 0; }

    /* SIDEBAR */
    .sidebar { width: 255px; min-height: 100vh; background: #0f172a; position: fixed; top: 0; left: 0; display: flex; flex-direction: column; z-index: 200; transition: transform 0.28s ease; }
    .sidebar-brand { padding: 1.4rem 1.3rem 1rem; border-bottom: 1px solid rgba(255,255,255,0.07); display: flex; align-items: center; gap: 11px; }
    .brand-icon { width: 40px; height: 40px; background: linear-gradient(135deg,#3b82f6,#10b981); border-radius: 11px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; color: white; flex-shrink: 0; }
    .brand-name { color: white; font-weight: 800; font-size: 0.98rem; line-height: 1.1; }
    .brand-name small { display: block; font-size: 0.65rem; font-weight: 500; color: rgba(255,255,255,0.38); letter-spacing: 0.6px; text-transform: uppercase; margin-top: 2px; }
    .sidebar-role { margin: 0.9rem 1.1rem 0.4rem; padding: 7px 11px; border-radius: 9px; display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.07); }
    .sidebar-role i { font-size: 0.88rem; }
    .sidebar-role span { font-size: 0.76rem; font-weight: 600; color: rgba(255,255,255,0.65); }
    .sidebar-nav { flex: 1; padding: 0.4rem 0.7rem; overflow-y: auto; }
    .nav-section { font-size: 0.66rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: rgba(255,255,255,0.25); padding: 12px 8px 5px; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 8px 11px; border-radius: 9px; color: rgba(255,255,255,0.52); font-size: 0.86rem; font-weight: 500; text-decoration: none; transition: all 0.15s; margin-bottom: 2px; cursor: pointer; }
    .nav-item:hover { background: rgba(255,255,255,0.07); color: white; }
    .nav-item.active { background: rgba(59,130,246,0.18); color: #93c5fd; font-weight: 600; }
    .nav-item i { font-size: 1rem; width: 19px; flex-shrink: 0; }
    .sidebar-footer { padding: 0.9rem 1.1rem; border-top: 1px solid rgba(255,255,255,0.07); }
    .user-card { display: flex; align-items: center; gap: 9px; padding: 9px; border-radius: 10px; background: rgba(255,255,255,0.05); margin-bottom: 9px; }
    .user-avatar { width: 34px; height: 34px; border-radius: 50%; background: linear-gradient(135deg,#3b82f6,#10b981); display: flex; align-items: center; justify-content: center; color: white; font-size: 0.85rem; font-weight: 700; flex-shrink: 0; }
    .user-info { flex: 1; overflow: hidden; }
    .user-name { color: white; font-size: 0.82rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .user-nim  { color: rgba(255,255,255,0.38); font-size: 0.7rem; }
    .btn-logout { width: 100%; background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); border-radius: 9px; color: #f87171; font-size: 0.82rem; font-weight: 600; padding: 7px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 7px; transition: all 0.2s; font-family: 'Plus Jakarta Sans', sans-serif; }
    .btn-logout:hover { background: rgba(239,68,68,0.18); }

    /* OVERLAY + MAIN */
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 190; }
    .overlay.show { display: block; }
    .main-wrapper { margin-left: 255px; min-height: 100vh; display: flex; flex-direction: column; }
    .topbar { height: 58px; background: white; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; padding: 0 1.5rem; gap: 12px; position: sticky; top: 0; z-index: 100; }
    .topbar-title { font-weight: 700; font-size: 0.98rem; color: #0f172a; flex: 1; }
    .topbar-date { font-size: 0.78rem; color: #94a3b8; }
    .btn-hmbg { background: none; border: none; font-size: 1.3rem; color: #64748b; cursor: pointer; padding: 4px; display: none; }
    .main-content { flex: 1; padding: 1.8rem; }

    /* COMPONENTS */
    .page-header { margin-bottom: 1.5rem; }
    .page-header h3 { font-size: 1.3rem; font-weight: 800; color: #0f172a; margin: 0 0 4px; }
    .page-header p { color: #64748b; font-size: 0.84rem; margin: 0; }

    .card-lms { background: white; border-radius: 14px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); border: none; }
    .card-lms .card-body { padding: 1.3rem; }

    .badge-role { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 20px; font-size: 0.74rem; font-weight: 600; }
    .badge-mhs { background: #eff6ff; color: #2563eb; }
    .badge-dsn { background: #ecfdf5; color: #059669; }
    .badge-adm { background: #f5f3ff; color: #7c3aed; }

    .btn-primary-lms { background: linear-gradient(135deg,#1d4ed8,#2563eb); border: none; border-radius: 9px; padding: 7px 18px; font-size: 0.85rem; font-weight: 700; color: white; display: inline-flex; align-items: center; gap: 7px; cursor: pointer; font-family: 'Plus Jakarta Sans', sans-serif; transition: all 0.2s; box-shadow: 0 3px 10px rgba(37,99,235,0.25); }
    .btn-primary-lms:hover { transform: translateY(-1px); box-shadow: 0 5px 16px rgba(37,99,235,0.35); }
    .btn-secondary-lms { background: #f8fafc; border: 1.5px solid #e2e8f0; border-radius: 9px; padding: 7px 18px; font-size: 0.85rem; font-weight: 600; color: #475569; display: inline-flex; align-items: center; gap: 7px; cursor: pointer; font-family: 'Plus Jakarta Sans', sans-serif; transition: all 0.2s; }
    .btn-secondary-lms:hover { background: #f1f5f9; }

    .tbl { width: 100%; border-collapse: collapse; }
    .tbl thead th { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: #94a3b8; padding: 10px 14px; border-bottom: 1px solid #f1f5f9; white-space: nowrap; }
    .tbl tbody td { padding: 11px 14px; font-size: 0.85rem; color: #334155; border-bottom: 1px solid #f8fafc; vertical-align: middle; }
    .tbl tbody tr:hover td { background: #fafbfc; }
    .tbl tbody tr:last-child td { border-bottom: none; }

    .empty-state { text-align: center; padding: 3rem 2rem; }
    .empty-state i { font-size: 2.5rem; color: #cbd5e1; }
    .empty-state p { color: #94a3b8; font-size: 0.86rem; margin-top: 10px; }

    #loadingScreen { position: fixed; inset: 0; background: #f1f5f9; display: flex; align-items: center; justify-content: center; z-index: 9999; flex-direction: column; gap: 12px; }
    #loadingScreen p { color: #64748b; font-size: 0.88rem; margin: 0; }

    @media (max-width: 767px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .main-wrapper { margin-left: 0; }
      .btn-hmbg { display: block; }
      .main-content { padding: 1rem; }
      .topbar { padding: 0 1rem; }
    }
    #dropZone:hover, #dropZone.drag { border-color: #3b82f6; background: #eff6ff; }
    .tugas-item { padding: 12px 14px; border: 1.5px solid #f1f5f9; border-radius: 11px; margin-bottom: 10px; }
    .ti-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 6px; }
    .ti-nama { font-weight: 700; font-size: 0.88rem; color: #0f172a; }
    .ti-matkul { font-size: 0.74rem; color: #94a3b8; margin-bottom: 4px; }
    .ti-footer { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .ti-stat { font-size: 0.75rem; color: #64748b; display: flex; align-items: center; gap: 4px; }
    .btn-danger-sm { background: #fef2f2; border: 1px solid #fecaca; border-radius: 7px; color: #dc2626; font-size: 0.76rem; font-weight: 600; padding: 4px 10px; cursor: pointer; font-family: 'Plus Jakarta Sans', sans-serif; transition: all 0.2s; }
    .btn-danger-sm:hover { background: #fee2e2; }
  </style>
</head>
<body>

<div id="loadingScreen">
  <div class="spinner-border" style="color:#3b82f6;" role="status"></div>
  <p>Memuat halaman...</p>
</div>

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-brand">
    <div class="brand-icon"><i class="bi bi-mortarboard-fill"></i></div>
    <div class="brand-name">LMS Praktis <small>Sistem Perkuliahan</small></div>
  </div>
  <div class="sidebar-role" id="sidebarRole">
    <i class="bi bi-person" style="color:#3b82f6;"></i>
    <span>Memuat...</span>
  </div>
  <nav class="sidebar-nav" id="sidebarNav"></nav>
  <div class="sidebar-footer">
    <div class="user-card">
      <div class="user-avatar" id="userAvatar">?</div>
      <div class="user-info">
        <div class="user-name" id="userName">—</div>
        <div class="user-nim" id="userNim">—</div>
      </div>
    </div>
    <button class="btn-logout" onclick="doLogout()">
      <i class="bi bi-box-arrow-left"></i> Keluar
    </button>
  </div>
</aside>

<div class="main-wrapper">
  <div class="topbar">
    <button class="btn-hmbg" onclick="openSidebar()"><i class="bi bi-list"></i></button>
    <span class="topbar-title">Upload Tugas (Dosen)</span>
    <span class="topbar-date" id="topbarDate"></span>
  </div>
  <main class="main-content">
    <div class="page-header">
      <h3><i class="bi bi-cloud-upload me-2 text-warning"></i>Upload & Kelola Tugas</h3>
      <p>Buat dan kelola tugas untuk mahasiswa</p>
    </div>

    <div class="row g-3">
      <div class="col-lg-5">
        <div class="card-lms">
          <div class="card-body">
            <h6 class="fw-bold mb-3">Buat Tugas Baru</h6>
            <div class="mb-3">
              <label class="form-label fw-semibold" style="font-size:0.82rem;">Mata Kuliah</label>
              <select class="form-select" id="tgsMatkul" style="border-radius:9px;font-size:0.85rem;">
                <option value="">Pilih mata kuliah...</option>
                <option value="1">Kalkulus I</option>
                <option value="2">Algoritma & Pemrograman</option>
                <option value="3">Kalkulus II</option>
              </select>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold" style="font-size:0.82rem;">Judul Tugas</label>
              <input type="text" class="form-control" id="tgsJudul" style="border-radius:9px;font-size:0.85rem;" placeholder="Contoh: Laporan Praktikum Bab 3" />
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold" style="font-size:0.82rem;">Deskripsi / Instruksi</label>
              <textarea class="form-control" id="tgsDeskripsi" rows="4" style="border-radius:9px;font-size:0.85rem;" placeholder="Jelaskan instruksi pengerjaan tugas..."></textarea>
            </div>
            <div class="row g-2 mb-3">
              <div class="col-6">
                <label class="form-label fw-semibold" style="font-size:0.82rem;">Tanggal Dibuka</label>
                <input type="date" class="form-control" id="tgsTanggal" style="border-radius:9px;font-size:0.85rem;" />
              </div>
              <div class="col-6">
                <label class="form-label fw-semibold" style="font-size:0.82rem;">Deadline</label>
                <input type="date" class="form-control" id="tgsDeadline" style="border-radius:9px;font-size:0.85rem;" />
              </div>
            </div>
            <div class="mb-4">
              <label class="form-label fw-semibold" style="font-size:0.82rem;">File Lampiran (opsional)</label>
              <div id="dropZone" style="border:2px dashed #e2e8f0;border-radius:10px;padding:1.5rem;text-align:center;cursor:pointer;transition:border-color 0.2s;">
                <i class="bi bi-file-earmark-arrow-up" style="font-size:1.8rem;color:#94a3b8;"></i>
                <p style="font-size:0.8rem;color:#94a3b8;margin:6px 0 0;">Drag & drop atau klik untuk unggah</p>
                <input type="file" id="tgsFile" style="display:none;" />
              </div>
            </div>
            <button class="btn-primary-lms w-100" onclick="simpanTugas()">
              <i class="bi bi-send"></i> Terbitkan Tugas
            </button>
          </div>
        </div>
      </div>

      <div class="col-lg-7">
        <div class="card-lms">
          <div class="card-body">
            <h6 class="fw-bold mb-3">Tugas yang Sudah Diterbitkan</h6>
            <div id="tugasList"></div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>


<script src="shared.js"></script>
<script>

async function init() {
  const user = await requireRole(['dosen', 'admin'])
  if (!user) return
  currentUser = user
  const { id: uid, role, nama, nim } = user
  buildSidebar(role, nama, nim, 'dsn-upload-tugas.html')
  setTopbarDate()
  hideLoading()
  await loadDsnTugas(uid, role)
}

async function doLogout() { handleLogout() }

init()

let currentUser = null
let tugasList   = []
let matkulList  = []

async function loadDsnTugas(uid, role) {
  try {
    const [matkul, tugas, enrollment, pengumpulan] = await Promise.all([
      apiFetch('/api/matkul'),
      apiFetch('/api/tugas'),
      apiFetch('/api/enrollment'),
      apiFetch('/api/pengumpulan'),
    ])
    matkulList = role === 'admin' ? matkul : matkul.filter(m => m.dosen_id === uid)
    tugasList  = (role === 'admin' ? tugas : tugas.filter(t => t.dosen_id === uid))
      .map(t => {
        const mk = matkul.find(m => m.id === t.matkul_id)
        const totalMhs = enrollment.filter(e => e.matkul_id === t.matkul_id).length
        const dikumpul = pengumpulan.filter(p => p.tugas_id === t.id).length
        return { ...t, matkulNama: mk?.nama || '—', dikumpul, total: totalMhs }
      })
      .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))

    // Populate matkul select
    const sel = document.getElementById('tgsMatkul')
    sel.innerHTML = '<option value="">-- Pilih Mata Kuliah --</option>' +
      matkulList.map(m => `<option value="${m.id}">${m.kode} — ${m.nama}</option>`).join('')

    // Set default tanggal
    document.getElementById('tgsTanggal').value = new Date().toISOString().slice(0,10)

    // Setup dropzone events
    const dz = document.getElementById('dropZone')
    dz.onclick = () => document.getElementById('tgsFile').click()
    dz.ondragover = e => { e.preventDefault(); dz.classList.add('drag') }
    dz.ondragleave = () => dz.classList.remove('drag')
    dz.ondrop = e => { e.preventDefault(); dz.classList.remove('drag'); const f = e.dataTransfer.files[0]; if (f) dz.querySelector('p').textContent = f.name }
    document.getElementById('tgsFile').onchange = e => { const f = e.target.files[0]; if (f) dz.querySelector('p').textContent = f.name }

    renderTugasList()
  } catch(err) {
    showToast('Gagal memuat data: ' + err.message, 'error')
  }
}

function renderTugasList() {
  const c = document.getElementById('tugasList')
  if (!tugasList.length) { c.innerHTML = '<div class="empty-state"><i class="bi bi-clipboard"></i><p>Belum ada tugas diterbitkan.</p></div>'; return }
  c.innerHTML = tugasList.map(t => {
    const pct = t.total ? Math.round(t.dikumpul / t.total * 100) : 0
    const dl = new Date(t.deadline)
    return `<div class="tugas-item">
      <div class="ti-header">
        <div>
          <div class="ti-matkul">${t.matkulNama}</div>
          <div class="ti-nama">${t.judul}</div>
        </div>
        <button class="btn-danger-sm" onclick="hapusTugas('${t.id}')"><i class="bi bi-trash"></i></button>
      </div>
      <div class="progress mb-2" style="height:5px;border-radius:3px;">
        <div class="progress-bar bg-success" style="width:${pct}%"></div>
      </div>
      <div class="ti-footer">
        <span class="ti-stat"><i class="bi bi-people"></i>${t.dikumpul}/${t.total} dikumpul</span>
        <span class="ti-stat"><i class="bi bi-clock"></i>Deadline: ${dl.toLocaleDateString('id-ID',{day:'2-digit',month:'short'})}</span>
        <span class="ti-stat ms-auto" style="color:${pct>=75?'#059669':pct>=40?'#d97706':'#dc2626'};">${pct}%</span>
      </div>
    </div>`
  }).join('')
}

async function simpanTugas() {
  const matkulId = document.getElementById('tgsMatkul').value
  const judul    = document.getElementById('tgsJudul').value.trim()
  const tanggal  = document.getElementById('tgsTanggal').value
  const dl       = document.getElementById('tgsDeadline').value
  const deskrip  = document.getElementById('tgsDeskripsi').value.trim()

  if (!matkulId || !judul || !dl) {
    showToast('Mata kuliah, judul, dan deadline wajib diisi', 'error')
    return
  }
  if (tanggal && dl && dl < tanggal) {
    showToast('Deadline tidak boleh sebelum tanggal dibuka', 'error')
    return
  }

  try {
    await apiFetch('/api/tugas', {
      method: 'POST',
      body: JSON.stringify({ judul, deskripsi: deskrip, matkul_id: matkulId, tanggal_buka: tanggal, deadline: dl })
    })
    showToast('Tugas berhasil diterbitkan! 🎉', 'success')
    // Reset form
    document.getElementById('tgsMatkul').value = ''
    document.getElementById('tgsJudul').value = ''
    document.getElementById('tgsDeskripsi').value = ''
    document.getElementById('tgsDeadline').value = ''
    const dz = document.getElementById('dropZone')
    dz.querySelector('p').textContent = 'Drag & drop atau klik untuk unggah'
    document.getElementById('tgsFile').value = ''
    await loadDsnTugas(currentUser.id, currentUser.role)
  } catch(err) {
    showToast('Gagal: ' + err.message, 'error')
  }
}

async function hapusTugas(id) {
  if (!confirm('Hapus tugas ini?')) return
  try {
    await apiFetch('/api/tugas', { method: 'DELETE', body: JSON.stringify({ id }) })
    showToast('Tugas dihapus', 'info')
    await loadDsnTugas(currentUser.id, currentUser.role)
  } catch(err) {
    showToast('Gagal: ' + err.message, 'error')
  }
}
</script>
</body>
</html>
