<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dashboard — LMS Praktis</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #f1f5f9;
      margin: 0;
    }

    /* ======== SIDEBAR ======== */
    .sidebar {
      width: 255px;
      min-height: 100vh;
      background: #0f172a;
      position: fixed;
      top: 0; left: 0;
      display: flex; flex-direction: column;
      z-index: 200;
      transition: transform 0.28s ease;
    }

    .sidebar-brand {
      padding: 1.4rem 1.3rem 1rem;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      display: flex; align-items: center; gap: 11px;
    }
    .brand-icon {
      width: 40px; height: 40px;
      background: linear-gradient(135deg,#3b82f6,#10b981);
      border-radius: 11px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; color: white; flex-shrink: 0;
    }
    .brand-name { color: white; font-weight: 800; font-size: 0.98rem; line-height: 1.1; }
    .brand-name small {
      display: block; font-size: 0.65rem; font-weight: 500;
      color: rgba(255,255,255,0.38); letter-spacing: 0.6px;
      text-transform: uppercase; margin-top: 2px;
    }

    .sidebar-role {
      margin: 0.9rem 1.1rem 0.4rem;
      padding: 7px 11px;
      border-radius: 9px;
      display: flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.07);
    }
    .sidebar-role i { font-size: 0.88rem; }
    .sidebar-role span { font-size: 0.76rem; font-weight: 600; color: rgba(255,255,255,0.65); }

    .sidebar-nav { flex: 1; padding: 0.4rem 0.7rem; overflow-y: auto; }

    .nav-section {
      font-size: 0.66rem; font-weight: 700; letter-spacing: 1px;
      text-transform: uppercase; color: rgba(255,255,255,0.25);
      padding: 12px 8px 5px;
    }

    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 11px; border-radius: 9px;
      color: rgba(255,255,255,0.52);
      font-size: 0.86rem; font-weight: 500;
      text-decoration: none;
      transition: all 0.15s;
      margin-bottom: 2px;
      cursor: pointer;
    }
    .nav-item:hover { background: rgba(255,255,255,0.07); color: white; }
    .nav-item.active { background: rgba(59,130,246,0.18); color: #93c5fd; font-weight: 600; }
    .nav-item i { font-size: 1rem; width: 19px; flex-shrink: 0; }

    .sidebar-footer {
      padding: 0.9rem 1.1rem;
      border-top: 1px solid rgba(255,255,255,0.07);
    }
    .user-card {
      display: flex; align-items: center; gap: 9px;
      padding: 9px; border-radius: 10px;
      background: rgba(255,255,255,0.05); margin-bottom: 9px;
    }
    .user-avatar {
      width: 34px; height: 34px; border-radius: 50%;
      background: linear-gradient(135deg,#3b82f6,#10b981);
      display: flex; align-items: center; justify-content: center;
      color: white; font-size: 0.85rem; font-weight: 700; flex-shrink: 0;
    }
    .user-info { flex: 1; overflow: hidden; }
    .user-name { color: white; font-size: 0.82rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .user-nim  { color: rgba(255,255,255,0.38); font-size: 0.7rem; }

    .btn-logout {
      width: 100%; background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.2); border-radius: 9px;
      color: #f87171; font-size: 0.82rem; font-weight: 600;
      padding: 7px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 7px;
      transition: all 0.2s; font-family: 'Plus Jakarta Sans', sans-serif;
    }
    .btn-logout:hover { background: rgba(239,68,68,0.18); border-color: rgba(239,68,68,0.35); }

    /* ======== OVERLAY MOBILE ======== */
    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.55); z-index: 190;
    }
    .overlay.show { display: block; }

    /* ======== MAIN ======== */
    .main-wrapper { margin-left: 255px; min-height: 100vh; display: flex; flex-direction: column; }

    .topbar {
      height: 58px; background: white;
      border-bottom: 1px solid #e2e8f0;
      display: flex; align-items: center;
      padding: 0 1.5rem; gap: 12px;
      position: sticky; top: 0; z-index: 100;
    }
    .topbar-title { font-weight: 700; font-size: 0.98rem; color: #0f172a; flex: 1; }
    .topbar-date { font-size: 0.78rem; color: #94a3b8; }

    .btn-hmbg {
      background: none; border: none;
      font-size: 1.3rem; color: #64748b; cursor: pointer;
      padding: 4px; display: none;
    }

    .main-content { flex: 1; padding: 1.8rem; }

    /* Welcome banner */
    .welcome-banner {
      background: linear-gradient(135deg, #1d4ed8 0%, #0ea5e9 100%);
      border-radius: 16px; padding: 1.8rem 2rem;
      color: white; margin-bottom: 1.5rem;
      position: relative; overflow: hidden;
    }
    .welcome-banner::before {
      content: ''; position: absolute;
      top: -30px; right: -30px;
      width: 160px; height: 160px;
      background: rgba(255,255,255,0.07); border-radius: 50%;
    }
    .welcome-banner::after {
      content: ''; position: absolute;
      bottom: -40px; right: 70px;
      width: 100px; height: 100px;
      background: rgba(255,255,255,0.05); border-radius: 50%;
    }
    .welcome-banner p { margin: 0; font-size: 0.83rem; opacity: 0.72; }
    .welcome-banner h2 { margin: 4px 0 8px; font-weight: 800; font-size: 1.6rem; }
    .role-badge {
      display: inline-block;
      background: rgba(255,255,255,0.15);
      border-radius: 20px; padding: 3px 13px;
      font-size: 0.78rem; font-weight: 600;
    }

    /* Stat cards */
    .stat-card {
      background: white; border-radius: 13px;
      padding: 1.1rem 1.2rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      display: flex; align-items: center; gap: 13px;
    }
    .stat-icon {
      width: 44px; height: 44px; border-radius: 11px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; flex-shrink: 0;
    }
    .stat-val { font-size: 1.4rem; font-weight: 800; color: #0f172a; line-height: 1; }
    .stat-lbl { font-size: 0.76rem; color: #94a3b8; margin-top: 3px; }

    /* Placeholder box */
    .placeholder-box {
      background: white; border-radius: 14px; padding: 3rem 2rem;
      text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .placeholder-box i { font-size: 2.8rem; color: #cbd5e1; }
    .placeholder-box p { color: #94a3b8; margin-top: 12px; font-size: 0.88rem; line-height: 1.7; }

    /* Loading screen */
    #loadingScreen {
      position: fixed; inset: 0;
      background: #f1f5f9;
      display: flex; align-items: center; justify-content: center;
      z-index: 9999; flex-direction: column; gap: 12px;
    }
    #loadingScreen p { color: #64748b; font-size: 0.88rem; margin: 0; }

    @media (max-width: 767px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .main-wrapper { margin-left: 0; }
      .btn-hmbg { display: block; }
      .main-content { padding: 1rem; }
      .topbar { padding: 0 1rem; }
    }
  </style>
</head>
<body>

<!-- Loading Screen -->
<div id="loadingScreen">
  <div class="spinner-border" style="color:#3b82f6;" role="status"></div>
  <p>Memuat dashboard...</p>
</div>

<!-- Sidebar Overlay (mobile) -->
<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<!-- Sidebar -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-brand">
    <div class="brand-icon"><i class="bi bi-mortarboard-fill"></i></div>
    <div class="brand-name">LMS Praktis <small>Sistem Perkuliahan</small></div>
  </div>

  <div class="sidebar-role" id="sidebarRole">
    <i class="bi bi-person" style="color:#3b82f6;"></i>
    <span>Memuat...</span>
  </div>

  <nav class="sidebar-nav" id="sidebarNav">
    <!-- diisi JS -->
  </nav>

  <div class="sidebar-footer">
    <div class="user-card">
      <div class="user-avatar" id="userAvatar">?</div>
      <div class="user-info">
        <div class="user-name" id="userName">—</div>
        <div class="user-nim"  id="userNim">—</div>
      </div>
    </div>
    <button class="btn-logout" onclick="handleLogout()">
      <i class="bi bi-box-arrow-left"></i> Keluar
    </button>
  </div>
</aside>

<!-- Main -->
<div class="main-wrapper">
  <div class="topbar">
    <button class="btn-hmbg" onclick="openSidebar()"><i class="bi bi-list"></i></button>
    <span class="topbar-title">Dashboard</span>
    <span class="topbar-date" id="topbarDate"></span>
  </div>

  <main class="main-content">
    <!-- Welcome banner -->
    <div class="welcome-banner">
      <p>Selamat datang,</p>
      <h2 id="welcomeName">—</h2>
      <span class="role-badge" id="welcomeRole">—</span>
    </div>

    <!-- Stat cards -->
    <div class="row g-3 mb-4" id="statCards">
      <!-- diisi JS sesuai role -->
    </div>

    <!-- Placeholder konten -->
    <div class="placeholder-box">
      <i class="bi bi-layout-text-sidebar-reverse"></i>
      <p>
        Konten dashboard akan tampil di sini.<br />
        Halaman ini siap dikembangkan lebih lanjut.
      </p>
    </div>
  </main>
</div>

<!-- Supabase CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  // ============================================================
  // CONFIG
  // ============================================================
  const SUPABASE_URL  = 'https://tykhjixclpjmsgwrlfxm.supabase.co'
  const SUPABASE_ANON = 'sb_publishable_JlBcaYcORxPvRZgEmbFzLA_zTZqGHpB'

  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON)

  // ============================================================
  // MENU per role
  // ============================================================
  const MENUS = {
    mahasiswa: [
      { label: 'Dashboard',   icon: 'bi-house',           href: 'dashboard.html',      active: true },
      { label: 'Mata Kuliah', icon: 'bi-book',            href: 'mhs-mata-kuliah.html' },
      { label: 'Tugas',       icon: 'bi-clipboard-check', href: 'mhs-tugas.html' },
      { label: 'Absensi',     icon: 'bi-calendar-check',  href: 'mhs-absensi.html' },
      { label: 'Diskusi',     icon: 'bi-chat-dots',       href: 'mhs-diskusi.html' },
    ],
    dosen: [
      { label: 'Dashboard',      icon: 'bi-house',           href: 'dashboard.html',         active: true },
      { label: 'Mata Kuliah',    icon: 'bi-book',            href: 'dsn-mata-kuliah.html' },
      { label: 'Upload Tugas',   icon: 'bi-cloud-upload',    href: 'dsn-upload-tugas.html' },
      { label: 'Kelola Absensi', icon: 'bi-person-check',    href: 'dsn-absensi.html' },
      { label: 'Hasil & Data',   icon: 'bi-bar-chart-line',  href: 'dsn-hasil.html' },
      { label: 'Diskusi',        icon: 'bi-chat-dots',       href: 'dsn-diskusi.html' },
    ],
    admin: [
      { label: 'Dashboard',      icon: 'bi-house',            href: 'dashboard.html',   active: true },
      { label: 'Kelola User',    icon: 'bi-people',           href: 'adm-user.html' },
      { label: 'Kelola Matkul',  icon: 'bi-journal-bookmark', href: 'adm-matkul.html' },
      { label: 'Hasil & Data',   icon: 'bi-bar-chart-line',   href: 'adm-hasil.html' },
    ],
  }

  const ROLE_INFO = {
    mahasiswa: { label: 'Mahasiswa',     color: '#2563eb', icon: 'bi-person-badge' },
    dosen:     { label: 'Dosen',         color: '#059669', icon: 'bi-person-workspace' },
    admin:     { label: 'Administrator', color: '#7c3aed', icon: 'bi-shield-lock' },
  }

  const STATS = {
    mahasiswa: [
      { label: 'Mata Kuliah', icon: 'bi-book',            color: '#3b82f6' },
      { label: 'Tugas Aktif', icon: 'bi-clipboard-check', color: '#f59e0b' },
      { label: 'Absensi Hari Ini', icon: 'bi-calendar-check', color: '#10b981' },
      { label: 'Diskusi Baru',    icon: 'bi-chat-dots',   color: '#8b5cf6' },
    ],
    dosen: [
      { label: 'Mata Kuliah Diampu', icon: 'bi-book',          color: '#3b82f6' },
      { label: 'Tugas Diterbitkan',  icon: 'bi-cloud-upload',  color: '#f59e0b' },
      { label: 'Absensi Pending',    icon: 'bi-person-check',  color: '#10b981' },
      { label: 'Total Mahasiswa',    icon: 'bi-people',        color: '#8b5cf6' },
    ],
    admin: [
      { label: 'Total User',     icon: 'bi-people',          color: '#3b82f6' },
      { label: 'Mata Kuliah',    icon: 'bi-book',            color: '#f59e0b' },
      { label: 'Dosen Aktif',    icon: 'bi-person-workspace',color: '#10b981' },
      { label: 'Mahasiswa',      icon: 'bi-person-badge',    color: '#8b5cf6' },
    ],
  }

  // ============================================================
  // INIT
  // ============================================================
  async function init() {
    // Cek sesi
    const { data: { session } } = await sb.auth.getSession()
    if (!session) {
      window.location.replace('login.html')
      return
    }

    // Ambil data dari sessionStorage (sudah diset saat login)
    let role  = sessionStorage.getItem('userRole') || 'mahasiswa'
    let nama  = sessionStorage.getItem('userName') || 'Pengguna'
    let nim   = sessionStorage.getItem('userNim')  || session.user.email

    // Kalau sessionStorage kosong (misal buka tab baru), ambil dari Supabase
    if (!sessionStorage.getItem('userRole')) {
      const { data: profile } = await sb
        .from('profiles')
        .select('role, nama, nim')
        .eq('id', session.user.id)
        .single()
      if (profile) {
        role = profile.role
        nama = profile.nama || nama
        nim  = profile.nim  || nim
        sessionStorage.setItem('userRole', role)
        sessionStorage.setItem('userName', nama)
        sessionStorage.setItem('userNim',  nim)
      }
    }

    renderUI(role, nama, nim)

    // Load stat cards
    await loadStats(sb, role, session.user.id)

    // Sembunyikan loading
    document.getElementById('loadingScreen').style.display = 'none'
  }

  // ============================================================
  // LOAD STATS
  // ============================================================
  const DEMO_STATS = {
    mahasiswa: [6, 3, 1, 2],
    dosen:     [3, 8, 2, 42],
    admin:     [48, 12, 6, 40],
  }

  async function loadStats(sb, role, userId) {
    const stats   = STATS[role] || STATS.mahasiswa
    const demo    = DEMO_STATS[role] || DEMO_STATS.mahasiswa
    const getCard = i => document.getElementById('statVal' + i)

    // Tampilkan nilai demo dulu (agar tidak kosong)
    demo.forEach((v, i) => { const el = getCard(i); if (el) el.textContent = v })

    // Coba load dari Supabase
    try {
      if (role === 'mahasiswa') {
        const [{ count: mkCount }, { count: tugasCount }] = await Promise.all([
          sb.from('enrollments').select('*', { count: 'exact', head: true }).eq('mahasiswa_id', userId),
          sb.from('tugas').select('*', { count: 'exact', head: true }),
        ])
        if (mkCount    !== null) { const el = getCard(0); if (el) el.textContent = mkCount }
        if (tugasCount !== null) { const el = getCard(1); if (el) el.textContent = tugasCount }
      } else if (role === 'dosen') {
        const [{ count: mkCount }, { count: tugasCount }] = await Promise.all([
          sb.from('mata_kuliah').select('*', { count: 'exact', head: true }).eq('dosen_id', userId),
          sb.from('tugas').select('*', { count: 'exact', head: true }).eq('dosen_id', userId),
        ])
        if (mkCount    !== null) { const el = getCard(0); if (el) el.textContent = mkCount }
        if (tugasCount !== null) { const el = getCard(1); if (el) el.textContent = tugasCount }
      } else if (role === 'admin') {
        const [{ count: userCount }, { count: mkCount }] = await Promise.all([
          sb.from('profiles').select('*', { count: 'exact', head: true }),
          sb.from('mata_kuliah').select('*', { count: 'exact', head: true }),
        ])
        if (userCount !== null) { const el = getCard(0); if (el) el.textContent = userCount }
        if (mkCount   !== null) { const el = getCard(1); if (el) el.textContent = mkCount }
      }
    } catch (_) {
      // Tetap pakai nilai demo jika query gagal
    }
  }

  // ============================================================
  // RENDER
  // ============================================================
  function renderUI(role, nama, nim) {
    const ri = ROLE_INFO[role] || ROLE_INFO.mahasiswa

    // Sidebar role badge
    document.getElementById('sidebarRole').innerHTML =
      `<i class="bi ${ri.icon}" style="color:${ri.color};"></i><span>${ri.label}</span>`

    // User card
    document.getElementById('userAvatar').textContent = nama ? nama[0].toUpperCase() : 'U'
    document.getElementById('userName').textContent   = nama
    document.getElementById('userNim').textContent    = nim

    // Welcome banner
    document.getElementById('welcomeName').textContent = nama + ' 👋'
    document.getElementById('welcomeRole').textContent = ri.label

    // Menu sidebar
    const nav   = document.getElementById('sidebarNav')
    const menus = MENUS[role] || MENUS.mahasiswa
    nav.innerHTML = '<div class="nav-section">Menu Utama</div>'
    menus.forEach(m => {
      nav.innerHTML += `
        <a class="nav-item ${m.active ? 'active' : ''}" href="${m.href}">
          <i class="bi ${m.icon}"></i>${m.label}
        </a>`
    })

    // Stat cards
    const stats     = STATS[role] || STATS.mahasiswa
    const cardWrap  = document.getElementById('statCards')
    cardWrap.innerHTML = ''
    stats.forEach((s, idx) => {
      cardWrap.innerHTML += `
        <div class="col-6 col-lg-3">
          <div class="stat-card">
            <div class="stat-icon" style="background:${s.color}18;color:${s.color};">
              <i class="bi ${s.icon}"></i>
            </div>
            <div>
              <div class="stat-val" id="statVal${idx}">—</div>
              <div class="stat-lbl">${s.label}</div>
            </div>
          </div>
        </div>`
    })

    // Tanggal di topbar
    document.getElementById('topbarDate').textContent =
      new Date().toLocaleDateString('id-ID', { weekday:'long', year:'numeric', month:'long', day:'numeric' })
  }

  // ============================================================
  // SIDEBAR (mobile)
  // ============================================================
  function openSidebar()  {
    document.getElementById('sidebar').classList.add('open')
    document.getElementById('overlay').classList.add('show')
  }
  function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open')
    document.getElementById('overlay').classList.remove('show')
  }

  // ============================================================
  // LOGOUT
  // ============================================================
  async function handleLogout() {
    await sb.auth.signOut()
    sessionStorage.clear()
    window.location.replace('login.html')
  }

  // Jalankan
  init()
</script>

</body>
</html>
