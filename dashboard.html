<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard | LMS Unmuh Babel</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Plus Jakarta Sans',sans-serif;
background:#f1f5f9;
}

.sidebar{

position:fixed;
left:0;
top:0;

width:260px;
height:100vh;

background:#0f172a;

display:flex;
flex-direction:column;

z-index:1000;
}

.brand{

padding:24px;

border-bottom:
1px solid rgba(255,255,255,.08);

color:white;
}

.brand h4{
font-weight:800;
margin:0;
}

.brand small{
color:#94a3b8;
}

.user-card{

padding:20px;

border-bottom:
1px solid rgba(255,255,255,.08);

}

.avatar{

width:55px;
height:55px;

border-radius:50%;

background:#2563eb;

display:flex;
align-items:center;
justify-content:center;

color:white;
font-size:20px;
font-weight:700;

margin-bottom:10px;
}

.user-name{
color:white;
font-weight:700;
}

.user-role{
color:#94a3b8;
font-size:14px;
}

.menu{

padding:15px;

flex:1;
}

.menu a{

display:flex;
align-items:center;

gap:10px;

padding:12px 15px;

color:#cbd5e1;

text-decoration:none;

border-radius:10px;

margin-bottom:6px;
}

.menu a:hover{
background:#1e293b;
}

.menu a.active{
background:#2563eb;
color:white;
}

.logout{

margin:15px;

border:none;

height:50px;

background:#dc2626;
color:white;

border-radius:10px;
font-weight:700;
}

.main{

margin-left:260px;

padding:30px;
}

.welcome{

background:
linear-gradient(
135deg,
#2563eb,
#1d4ed8
);

color:white;

padding:30px;

border-radius:20px;

margin-bottom:25px;
}

.welcome h2{
font-weight:800;
margin-bottom:10px;
}

.stats{

display:grid;

grid-template-columns:
repeat(4,1fr);

gap:20px;

margin-bottom:25px;
}

.card-stat{

background:white;

padding:20px;

border-radius:15px;

box-shadow:
0 2px 10px
rgba(0,0,0,.05);
}

.card-stat h3{
font-size:30px;
font-weight:800;
}

.card-stat p{
margin:0;
color:#64748b;
}

.section{

background:white;

padding:25px;

border-radius:15px;

box-shadow:
0 2px 10px
rgba(0,0,0,.05);
}

.loading{
text-align:center;
padding:50px;
}

@media(max-width:900px){

.stats{
grid-template-columns:
1fr 1fr;
}

}

@media(max-width:768px){

.sidebar{
display:none;
}

.main{
margin-left:0;
}

.stats{
grid-template-columns:
1fr;
}

}

</style>

</head>

<body>

<aside class="sidebar">

<div class="brand">

<h4>
LMS Unmuh Babel
</h4>

<small>
Sistem Pembelajaran
</small>

</div>

<div class="user-card">

<div
id="avatar"
class="avatar">
?
</div>

<div
id="userName"
class="user-name">
Loading...
</div>

<div
id="userRole"
class="user-role">
Loading...
</div>

</div>

<div class="menu">

<a href="#" class="active">
<i class="bi bi-grid"></i>
Dashboard
</a>

<a href="#">
<i class="bi bi-book"></i>
Mata Kuliah
</a>

<a href="#">
<i class="bi bi-journal-text"></i>
Tugas
</a>

<a href="#">
<i class="bi bi-calendar-check"></i>
Absensi
</a>

<a href="#">
<i class="bi bi-chat-dots"></i>
Diskusi
</a>

</div>

<button
class="logout"
onclick="logout()">

Keluar

</button>

</aside>

<main class="main">

<div class="welcome">

<h2 id="welcomeText">
Selamat Datang
</h2>

<p>
Dashboard Akademik LMS Unmuh Babel
</p>

</div>

<div class="stats">

<div class="card-stat">

<h3 id="matkulCount">
0
</h3>

<p>
Mata Kuliah
</p>

</div>

<div class="card-stat">

<h3 id="tugasCount">
0
</h3>

<p>
Tugas
</p>

</div>

<div class="card-stat">

<h3 id="absensiCount">
0
</h3>

<p>
Absensi
</p>

</div>

<div class="card-stat">

<h3 id="diskusiCount">
0
</h3>

<p>
Diskusi
</p>

</div>

</div>

<div class="section">

<h4 class="mb-3">
Informasi Akademik
</h4>

<div id="infoContainer">

<div class="loading">
Memuat data...
</div>

</div>

</div>

</main>

<script>

const user =
JSON.parse(
localStorage.getItem("user")
);

if(!user){

window.location.href =
"login.html";

}

document
.getElementById("userName")
.innerText =
user.nama;

document
.getElementById("userRole")
.innerText =
user.role;

document
.getElementById("welcomeText")
.innerText =
"Selamat Datang, " +
user.nama;

document
.getElementById("avatar")
.innerText =
user.nama
.charAt(0)
.toUpperCase();

async function loadStats(){

try{

const response =
await fetch(
"/api/stats"
);

const stats =
await response.json();

document
.getElementById(
"matkulCount"
)
.innerText =
stats.totalMatkul;

document
.getElementById(
"tugasCount"
)
.innerText =
stats.totalTugas;

document
.getElementById(
"absensiCount"
)
.innerText =
stats.totalAbsensi;

document
.getElementById(
"diskusiCount"
)
.innerText =
stats.totalDiskusi;

}catch(error){

console.error(error);

}

}

async function loadProfile(){

try{

const response =
await fetch(
"/api/profile?nim=" +
user.nim
);

const profile =
await response.json();

document
.getElementById(
"infoContainer"
)
.innerHTML =
`
<div class="row">

<div class="col-md-6 mb-3">
<b>Nama</b><br>
${profile.nama}
</div>

<div class="col-md-6 mb-3">
<b>NIM/NIDN</b><br>
${profile.nim}
</div>

<div class="col-md-6 mb-3">
<b>Role</b><br>
${profile.role}
</div>

<div class="col-md-6 mb-3">
<b>ID User</b><br>
${profile.id}
</div>

</div>
`;

}catch(error){

document
.getElementById(
"infoContainer"
)
.innerHTML =
`
<div class="alert alert-danger">
Gagal memuat data.
</div>
`;

}

}

function logout(){

localStorage.removeItem(
"user"
);

window.location.href =
"login.html";

}

loadStats();
loadProfile();

</script>

</body>
</html>
