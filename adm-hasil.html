<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <title>Hasil & Data (Admin) — LMS Praktis</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f1f5f9; margin: 0; }

    /* SIDEBAR */
    .sidebar { width: 255px; min-height: 100vh; background: #0f172a; position: fixed; top: 0; left: 0; display: flex; flex-direction: column; z-index: 200; transition: transform 0.28s ease; }
    .sidebar-brand { padding: 1.4rem 1.3rem 1rem; border-bottom: 1px solid rgba(255,255,255,0.07); display: flex; align-items: center; gap: 11px; }
    .brand-icon { width: 40px; height: 40px; background: linear-gradient(135deg,#3b82f6,#10b981); border-radius: 11px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; color: white; flex-shrink: 0; }
    .brand-name { color: white; font-weight: 800; font-size: 0.98rem; line-height: 1.1; }
    .brand-name small { display: block; font-size: 0.65rem; font-weight: 500; color: rgba(255,255,255,0.38); letter-spacing: 0.6px; text-transform: uppercase; margin-top: 2px; }
    .sidebar-role { margin: 0.9rem 1.1rem 0.4rem; padding: 7px 11px; border-radius: 9px; display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.07); }
    .sidebar-role i { font-size: 0.88rem; }
    .sidebar-role span { font-size: 0.76rem; font-weight: 600; color: rgba(255,255,255,0.65); }
    .sidebar-nav { flex: 1; padding: 0.4rem 0.7rem; overflow-y: auto; }
    .nav-section { font-size: 0.66rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: rgba(255,255,255,0.25); padding: 12px 8px 5px; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 8px 11px; border-radius: 9px; color: rgba(255,255,255,0.52); font-size: 0.86rem; font-weight: 500; text-decoration: none; transition: all 0.15s; margin-bottom: 2px; cursor: pointer; }
    .nav-item:hover { background: rgba(255,255,255,0.07); color: white; }
    .nav-item.active { background: rgba(59,130,246,0.18); color: #93c5fd; font-weight: 600; }
    .nav-item i { font-size: 1rem; width: 19px; flex-shrink: 0; }
    .sidebar-footer { padding: 0.9rem 1.1rem; border-top: 1px solid rgba(255,255,255,0.07); }
    .user-card { display: flex; align-items: center; gap: 9px; padding: 9px; border-radius: 10px; background: rgba(255,255,255,0.05); margin-bottom: 9px; }
    .user-avatar { width: 34px; height: 34px; border-radius: 50%; background: linear-gradient(135deg,#3b82f6,#10b981); display: flex; align-items: center; justify-content: center; color: white; font-size: 0.85rem; font-weight: 700; flex-shrink: 0; }
    .user-info { flex: 1; overflow: hidden; }
    .user-name { color: white; font-size: 0.82rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .user-nim  { color: rgba(255,255,255,0.38); font-size: 0.7rem; }
    .btn-logout { width: 100%; background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); border-radius: 9px; color: #f87171; font-size: 0.82rem; font-weight: 600; padding: 7px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 7px; transition: all 0.2s; font-family: 'Plus Jakarta Sans', sans-serif; }
    .btn-logout:hover { background: rgba(239,68,68,0.18); }

    /* OVERLAY + MAIN */
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 190; }
    .overlay.show { display: block; }
    .main-wrapper { margin-left: 255px; min-height: 100vh; display: flex; flex-direction: column; }
    .topbar { height: 58px; background: white; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; padding: 0 1.5rem; gap: 12px; position: sticky; top: 0; z-index: 100; }
    .topbar-title { font-weight: 700; font-size: 0.98rem; color: #0f172a; flex: 1; }
    .topbar-date { font-size: 0.78rem; color: #94a3b8; }
    .btn-hmbg { background: none; border: none; font-size: 1.3rem; color: #64748b; cursor: pointer; padding: 4px; display: none; }
    .main-content { flex: 1; padding: 1.8rem; }

    /* COMPONENTS */
    .page-header { margin-bottom: 1.5rem; }
    .page-header h3 { font-size: 1.3rem; font-weight: 800; color: #0f172a; margin: 0 0 4px; }
    .page-header p { color: #64748b; font-size: 0.84rem; margin: 0; }

    .card-lms { background: white; border-radius: 14px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); border: none; }
    .card-lms .card-body { padding: 1.3rem; }

    .badge-role { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 20px; font-size: 0.74rem; font-weight: 600; }
    .badge-mhs { background: #eff6ff; color: #2563eb; }
    .badge-dsn { background: #ecfdf5; color: #059669; }
    .badge-adm { background: #f5f3ff; color: #7c3aed; }

    .btn-primary-lms { background: linear-gradient(135deg,#1d4ed8,#2563eb); border: none; border-radius: 9px; padding: 7px 18px; font-size: 0.85rem; font-weight: 700; color: white; display: inline-flex; align-items: center; gap: 7px; cursor: pointer; font-family: 'Plus Jakarta Sans', sans-serif; transition: all 0.2s; box-shadow: 0 3px 10px rgba(37,99,235,0.25); }
    .btn-primary-lms:hover { transform: translateY(-1px); box-shadow: 0 5px 16px rgba(37,99,235,0.35); }
    .btn-secondary-lms { background: #f8fafc; border: 1.5px solid #e2e8f0; border-radius: 9px; padding: 7px 18px; font-size: 0.85rem; font-weight: 600; color: #475569; display: inline-flex; align-items: center; gap: 7px; cursor: pointer; font-family: 'Plus Jakarta Sans', sans-serif; transition: all 0.2s; }
    .btn-secondary-lms:hover { background: #f1f5f9; }

    .tbl { width: 100%; border-collapse: collapse; }
    .tbl thead th { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: #94a3b8; padding: 10px 14px; border-bottom: 1px solid #f1f5f9; white-space: nowrap; }
    .tbl tbody td { padding: 11px 14px; font-size: 0.85rem; color: #334155; border-bottom: 1px solid #f8fafc; vertical-align: middle; }
    .tbl tbody tr:hover td { background: #fafbfc; }
    .tbl tbody tr:last-child td { border-bottom: none; }

    .empty-state { text-align: center; padding: 3rem 2rem; }
    .empty-state i { font-size: 2.5rem; color: #cbd5e1; }
    .empty-state p { color: #94a3b8; font-size: 0.86rem; margin-top: 10px; }

    #loadingScreen { position: fixed; inset: 0; background: #f1f5f9; display: flex; align-items: center; justify-content: center; z-index: 9999; flex-direction: column; gap: 12px; }
    #loadingScreen p { color: #64748b; font-size: 0.88rem; margin: 0; }

    @media (max-width: 767px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .main-wrapper { margin-left: 0; }
      .btn-hmbg { display: block; }
      .main-content { padding: 1rem; }
      .topbar { padding: 0 1rem; }
    }
    .bar-row { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
    .bar-label { font-size: 0.82rem; font-weight: 600; color: #334155; width: 140px; flex-shrink: 0; }
    .bar-track { flex: 1; background: #f1f5f9; border-radius: 20px; height: 10px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 20px; transition: width 0.5s ease; }
    .bar-pct { font-size: 0.78rem; font-weight: 700; width: 36px; text-align: right; flex-shrink: 0; }
    .grade-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
    .grade-lbl { font-size: 0.85rem; font-weight: 700; width: 24px; }
  </style>
</head>
<body>

<div id="loadingScreen">
  <div class="spinner-border" style="color:#3b82f6;" role="status"></div>
  <p>Memuat halaman...</p>
</div>

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-brand">
    <div class="brand-icon"><i class="bi bi-mortarboard-fill"></i></div>
    <div class="brand-name">LMS Praktis <small>Sistem Perkuliahan</small></div>
  </div>
  <div class="sidebar-role" id="sidebarRole">
    <i class="bi bi-person" style="color:#3b82f6;"></i>
    <span>Memuat...</span>
  </div>
  <nav class="sidebar-nav" id="sidebarNav"></nav>
  <div class="sidebar-footer">
    <div class="user-card">
      <div class="user-avatar" id="userAvatar">?</div>
      <div class="user-info">
        <div class="user-name" id="userName">—</div>
        <div class="user-nim" id="userNim">—</div>
      </div>
    </div>
    <button class="btn-logout" onclick="doLogout()">
      <i class="bi bi-box-arrow-left"></i> Keluar
    </button>
  </div>
</aside>

<div class="main-wrapper">
  <div class="topbar">
    <button class="btn-hmbg" onclick="openSidebar()"><i class="bi bi-list"></i></button>
    <span class="topbar-title">Hasil & Data (Admin)</span>
    <span class="topbar-date" id="topbarDate"></span>
  </div>
  <main class="main-content">
    <div class="page-header">
      <h3><i class="bi bi-bar-chart-line me-2 text-primary"></i>Hasil & Data (Admin)</h3>
      <p>Overview lengkap sistem LMS kampus</p>
    </div>

    <!-- Big stat cards -->
    <div class="row g-3 mb-4">
      <div class="col-6 col-md-3">
        <div class="card-lms"><div class="card-body">
          <div style="display:flex;align-items:center;gap:12px;">
            <div style="width:46px;height:46px;border-radius:12px;background:#eff6ff;color:#2563eb;display:flex;align-items:center;justify-content:center;font-size:1.3rem;"><i class="bi bi-people"></i></div>
            <div><div style="font-size:1.8rem;font-weight:800;color:#0f172a;">247</div><div style="font-size:0.76rem;color:#94a3b8;">Total Mahasiswa</div></div>
          </div>
        </div></div>
      </div>
      <div class="col-6 col-md-3">
        <div class="card-lms"><div class="card-body">
          <div style="display:flex;align-items:center;gap:12px;">
            <div style="width:46px;height:46px;border-radius:12px;background:#ecfdf5;color:#059669;display:flex;align-items:center;justify-content:center;font-size:1.3rem;"><i class="bi bi-person-workspace"></i></div>
            <div><div style="font-size:1.8rem;font-weight:800;color:#0f172a;">18</div><div style="font-size:0.76rem;color:#94a3b8;">Dosen Aktif</div></div>
          </div>
        </div></div>
      </div>
      <div class="col-6 col-md-3">
        <div class="card-lms"><div class="card-body">
          <div style="display:flex;align-items:center;gap:12px;">
            <div style="width:46px;height:46px;border-radius:12px;background:#fff7ed;color:#d97706;display:flex;align-items:center;justify-content:center;font-size:1.3rem;"><i class="bi bi-book"></i></div>
            <div><div style="font-size:1.8rem;font-weight:800;color:#0f172a;">32</div><div style="font-size:0.76rem;color:#94a3b8;">Mata Kuliah</div></div>
          </div>
        </div></div>
      </div>
      <div class="col-6 col-md-3">
        <div class="card-lms"><div class="card-body">
          <div style="display:flex;align-items:center;gap:12px;">
            <div style="width:46px;height:46px;border-radius:12px;background:#f5f3ff;color:#7c3aed;display:flex;align-items:center;justify-content:center;font-size:1.3rem;"><i class="bi bi-clipboard-check"></i></div>
            <div><div style="font-size:1.8rem;font-weight:800;color:#0f172a;">128</div><div style="font-size:0.76rem;color:#94a3b8;">Tugas Aktif</div></div>
          </div>
        </div></div>
      </div>
    </div>

    <div class="row g-3">
      <div class="col-lg-6">
        <div class="card-lms">
          <div class="card-body">
            <h6 class="fw-bold mb-3">Kehadiran Rata-rata per Prodi</h6>
            <div id="absensiProdi"></div>
          </div>
        </div>
      </div>
      <div class="col-lg-6">
        <div class="card-lms">
          <div class="card-body">
            <h6 class="fw-bold mb-3">Distribusi Nilai Keseluruhan</h6>
            <div id="distribusiNilai"></div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>


<script src="shared.js"></script>
<script>

async function init() {
  const user = await requireRole(['admin'])
  if (!user) return
  const { id: uid, role, nama, nim } = user
  buildSidebar(role, nama, nim, 'adm-hasil.html')
  setTopbarDate()
  hideLoading()
  await loadHasil()
}

async function doLogout() { handleLogout() }

init()

async function loadHasil() {
  try {
    const [users, matkul, nilai, absensi, prodi] = await Promise.all([
      apiFetch('/api/users'),
      apiFetch('/api/matkul'),
      apiFetch('/api/nilai'),
      apiFetch('/api/absensi'),
      apiFetch('/api/prodi'),
    ])

    const mhsList = users.filter(u => u.role === 'mahasiswa')
    const dosenList = users.filter(u => u.role === 'dosen')

    // Stat cards
    const sv = (id, v) => { const el = document.getElementById(id); if (el) el.textContent = v }
    sv('statTotalMhs',   mhsList.length)
    sv('statTotalDosen', dosenList.length)
    sv('statTotalMatkul',matkul.length)
    sv('statTotalNilai', nilai.length)

    // Distribusi nilai
    const gradeColor = { A: '#059669', B: '#2563eb', C: '#d97706', D: '#ef4444', E: '#94a3b8' }
    const gradeCounts = { A: 0, B: 0, C: 0, D: 0, E: 0 }
    nilai.forEach(n => {
      const v = n.nilai_akhir || 0
      if (v >= 80) gradeCounts.A++
      else if (v >= 70) gradeCounts.B++
      else if (v >= 60) gradeCounts.C++
      else if (v >= 50) gradeCounts.D++
      else gradeCounts.E++
    })
    const total = Object.values(gradeCounts).reduce((a, b) => a + b, 0) || 1
    const distEl = document.getElementById('distribusiNilai')
    if (distEl) distEl.innerHTML = Object.entries(gradeCounts).map(([g, j]) => `
      <div class="grade-row">
        <div class="grade-lbl" style="color:${gradeColor[g]};">${g}</div>
        <div class="bar-track" style="flex:1;"><div class="bar-fill" style="width:${Math.round(j/total*100)}%;background:${gradeColor[g]};"></div></div>
        <div style="font-size:0.78rem;color:#64748b;width:60px;text-align:right;">${j} mhs</div>
      </div>`).join('')

    // Absensi per prodi
    const COLORS = ['#2563eb','#10b981','#f59e0b','#8b5cf6','#ef4444','#0d9488']
    const prodiEl = document.getElementById('absensiProdi')
    if (prodiEl && prodi.length) {
      const matkulByProdi = prodi.map(p => ({
        ...p, mks: matkul.filter(m => m.prodi_id === p.id).map(m => m.id)
      }))
      prodiEl.innerHTML = matkulByProdi.map((p, i) => {
        const total = absensi.filter(a => p.mks.some(mid => mid === a.matkul_id)).length
        const hadir = absensi.filter(a => p.mks.some(mid => mid === a.matkul_id) && a.status === 'hadir').length
        const pct = total ? Math.round(hadir / total * 100) : 0
        const color = COLORS[i % COLORS.length]
        return `<div class="bar-row">
          <div class="bar-label">${p.nama}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color};"></div></div>
          <div class="bar-pct" style="color:${color};">${pct}%</div>
        </div>`
      }).join('')
    }

    // Tabel nilai per matkul
    const tabelEl = document.getElementById('tabelHasil')
    if (tabelEl) {
      tabelEl.innerHTML = matkul.map(m => {
        const nilaiMatkul = nilai.filter(n => n.matkul_id === m.id)
        const avg = nilaiMatkul.length ? Math.round(nilaiMatkul.reduce((a, n) => a + (n.nilai_akhir || 0), 0) / nilaiMatkul.length) : '—'
        const dosenNama = users.find(u => u.id === m.dosen_id)?.nama || '—'
        return `<tr>
          <td style="font-family:monospace;font-size:0.82rem;">${m.kode}</td>
          <td class="fw-semibold">${m.nama}</td>
          <td>${dosenNama}</td>
          <td>${nilaiMatkul.length}</td>
          <td><span style="background:#f1f5f9;padding:2px 9px;border-radius:20px;font-size:0.8rem;font-weight:600;">${avg}</span></td>
        </tr>`
      }).join('')
    }
  } catch(err) {
    showToast('Gagal memuat data: ' + err.message, 'error')
  }
}
</script>
</body>
</html>
